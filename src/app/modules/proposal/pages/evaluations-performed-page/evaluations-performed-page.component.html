<div class="w-full">
  <div class="bg-white rounded-lg shadow-sm p-6">

    <div class="mb-6">
      <button (click)="goBack()" class="flex items-center gap-2 text-navy-900 hover:text-navy-700 font-bold group w-fit">
        <span class="material-symbols-outlined text-[#000066] text-lg group-hover:-translate-x-1 transition-transform">
          arrow_back
        </span>
        <span class="return-arrow-option">Regresar</span>
      </button>
    </div>

    <app-table-component
      [value]="evaluations()"
      [columns]="columns"
      [paginator]="true"
      (actionClick)="handleTableAction($event)"
      emptyMessage="No hay evaluaciones registradas."
    ></app-table-component>

  </div>
</div>

@if (modalState().evaluation; as evaluation) {
  <app-evaluation-modal
    [isOpen]="modalState().open"
    [name]="evaluation.evaluatorName"
    [role]="evaluation.evaluatorRole"
    [evaluationDate]="evaluation.date"
    [state]="evaluation.veredict"
    [comments]="evaluation.observations"
    [documents]="evaluation.signedDocuments || []"
    (onClose)="closeModal()"
    (onDownloadFile)="handleDownload($event)"
  ></app-evaluation-modal>
}
