@if (!isEditing) {
  <app-roles-view-modal
    [(isOpen)]="isOpen"
    [username]="username"
    [roles]="roles"
    (onManage)="toggleEditing(true)"
    (isOpenChange)="closeAll()"
  ></app-roles-view-modal>
}

@else {
  <app-roles-selection-modal
    [(isOpen)]="isOpen"
    [roles]="roles"
    (onSave)="handleSave($event)"
    (isOpenChange)="closeAll()"
  ></app-roles-selection-modal>
}
