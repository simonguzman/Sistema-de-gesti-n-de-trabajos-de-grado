<p-button
  [disabled]="disabled"
  [ngClass]="{
    'btn-primary': variant === 'primary',
    'btn-secondary': variant === 'secondary',
    'btn-icon': icon && !label
  }"
  (onClick)="onButtonClick()"
>
  @if (icon) {
    <span class="material-symbols-outlined">{{ icon }}</span>
  }
  @if (label) {
    {{ label }}
  }
</p-button>
